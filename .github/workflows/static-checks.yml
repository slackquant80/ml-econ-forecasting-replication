name: static-checks
on: [push, pull_request]
jobs:
  verify-public-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify public file policy and privacy
        run: python scripts/verify-public-release.py
      - name: Validate frozen research outputs
        run: python scripts/validate-frozen-release.py
      - name: Check release inventories
        run: python scripts/generate-release-inventory.py --check
